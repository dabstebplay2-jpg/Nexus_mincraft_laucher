name: Build Windows EXE, Release and Website

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows release assets
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies and build EXE/portable
        shell: pwsh
        run: |
          .\scripts\build_release.ps1 -Python python -SkipVenv
        env:
          NEXUS_GITHUB_OWNER: ${{ github.repository_owner }}
          NEXUS_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: |
          .\scripts\build_installer.ps1 -Python python -SkipReleaseBuild
        env:
          NEXUS_GITHUB_OWNER: ${{ github.repository_owner }}
          NEXUS_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusLauncher-Windows
          path: |
            release/*.exe
            release/*.zip
            release/*.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.zip
            release/*.sha256
          generate_release_notes: true

  deploy-website:
    name: Deploy website to GitHub Pages
    needs: build-windows
    runs-on: ubuntu-latest
    if: success()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    concurrency:
      group: "pages"
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python -c 'from core.app_info import APP_VERSION; print(APP_VERSION)')"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate website release metadata
        run: |
          python tools/generate_website_release.py --version "${{ steps.version.outputs.version }}" --repo "${{ github.repository }}"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "website"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
