name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "tools/generate_website_release.py"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static website
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate website release metadata
        run: |
          VERSION="$(python -c 'from core.app_info import APP_VERSION; print(APP_VERSION)')"
          python tools/generate_website_release.py --version "$VERSION" --repo "${{ github.repository }}"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "website"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
